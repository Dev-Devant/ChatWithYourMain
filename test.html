<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Prueba de video</title>
  <style>
    body { margin: 0; background: #000; }
    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline>
    <source src="Background.mp4" type="video/mp4">
  </video>
</body>
</html>
